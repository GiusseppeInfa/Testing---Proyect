<h2>Historial Académico</h2>

<p><strong>Nombre:</strong> {{ estudiante.nombre }}</p>

<h3>Notas:</h3>

<ul>
{% for n in estudiante.notas %}
    <li>
        {{ n.valor }}
        <a href="/editar/{{ codigo }}/{{ loop.index0 }}">Editar</a>
